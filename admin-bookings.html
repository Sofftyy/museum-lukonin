<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все заявки | Админ-панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-header">
        <div class="logo">
            <h1>👑 Админ-панель</h1>
            <span>Мемориальная квартира М.К. Луконина</span>
        </div>
        <div class="admin-info">
            <span id="adminName">Администратор</span>
            <a href="admin-panel.html">Главная</a>
            <a href="admin-bookings.html" class="nav-link active">📋 Все заявки</a>
            <a href="javascript:void(0)" onclick="logout()" class="logout-btn">Выход</a>
        </div>
    </div>
    
    <div class="admin-nav">
        <a href="admin-panel.html" class="nav-link">📊 Главная</a>
        <a href="admin-bookings.html" class="nav-link active">📋 Все заявки</a>
    </div>
    
    <div class="admin-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
            <h2 class="section-title">📋 Все заявки на экскурсии</h2>
            <button class="export-btn" onclick="exportToExcel()">📎 Экспорт в Excel</button>
        </div>
        
        <div class="filter-bar">
            <select id="statusFilter">
                <option value="all">Все статусы</option>
                <option value="pending">⏳ Новые</option>
                <option value="confirmed">✅ Подтверждённые</option>
                <option value="cancelled">❌ Отменённые</option>
            </select>
            <input type="text" id="searchInput" placeholder="Поиск по имени или телефону...">
            <button onclick="applyFilters()">🔍 Применить</button>
            <button onclick="resetFilters()">🔄 Сбросить</button>
        </div>
        
        <div class="table-container">
            <div id="bookingsTable" class="loading">Загрузка заявок...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        let supabaseClient = null;
        let allBookings = [];
        
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        
        document.getElementById('adminName').textContent = localStorage.getItem('admin_username') || 'Администратор';
        
        function logout() {
            localStorage.removeItem('admin_logged_in');
            localStorage.removeItem('admin_username');
            localStorage.removeItem('admin_id');
            localStorage.removeItem('admin_email');
            window.location.href = 'admin-login.html';
        }
        
        async function initSupabase() {
            if (typeof supabase === 'undefined') {
                setTimeout(initSupabase, 500);
                return;
            }
            
            if (typeof SUPABASE_CONFIG === 'undefined' || !SUPABASE_CONFIG.url) {
                document.getElementById('bookingsTable').innerHTML = '<p style="padding:20px;">Ошибка подключения</p>';
                return;
            }
            
            const { createClient } = supabase;
            supabaseClient = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
            await loadAllBookings();
        }
        
        async function loadAllBookings() {
            if (!supabaseClient) return;
            
            try {
                const { data: bookings, error } = await supabaseClient
                    .from('bookings')
                    .select(`
                        *,
                        users (full_name, phone, email),
                        excursion_schedules (
                            excursion_date,
                            start_time,
                            excursions (name)
                        )
                    `)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                allBookings = bookings;
                renderBookingsTable(bookings);
                
            } catch (err) {
                console.error('Ошибка:', err);
                document.getElementById('bookingsTable').innerHTML = '<p style="padding:20px;">Ошибка загрузки</p>';
            }
        }
        
        function renderBookingsTable(bookings) {
            if (!bookings || bookings.length === 0) {
                document.getElementById('bookingsTable').innerHTML = '<p style="padding:20px; text-align:center;">📭 Нет заявок</p>';
                return;
            }
            
            let html = `<table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Дата и время</th>
                        <th>Экскурсия</th>
                        <th>Посетитель</th>
                        <th>Телефон</th>
                        <th>Email</th>
                        <th>Кол-во</th>
                        <th>Сумма</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>`;
            
            bookings.forEach(booking => {
                const schedule = booking.excursion_schedules;
                const excursion = schedule?.excursions;
                const user = booking.users;
                const dateStr = schedule?.excursion_date ? formatDateDisplay(schedule.excursion_date) : '-';
                const statusClass = booking.status === 'pending' ? 'status-pending' : (booking.status === 'confirmed' ? 'status-confirmed' : 'status-cancelled');
                const statusText = booking.status === 'pending' ? '⏳ Новая' : (booking.status === 'confirmed' ? '✅ Подтверждена' : '❌ Отменена');
                
                html += `<tr>
                    <td>${booking.id}</td>
                    <td>${dateStr}<br><small>${schedule?.start_time || ''}</small></td>
                    <td>${excursion?.name || '-'}</td>
                    <td>${user?.full_name || '-'}</td>
                    <td>${user?.phone || '-'}</td>
                    <td>${user?.email || '-'}</td>
                    <td style="text-align: center;">${booking.persons_count}</td>
                    <td>${booking.total_price} ₽</td>
                    <td><span class="${statusClass}">${statusText}</span></td>
                    <td>
                        ${booking.status === 'pending' ? `<button class="btn-small btn-confirm" onclick="updateStatus(${booking.id}, 'confirmed')">✅ Подтвердить</button>` : ''}
                        ${booking.status !== 'cancelled' ? `<button class="btn-small btn-cancel" onclick="updateStatus(${booking.id}, 'cancelled')">❌ Отменить</button>` : ''}
                    </td>
                </tr>`;
            });
            
            html += `</tbody></table>`;
            document.getElementById('bookingsTable').innerHTML = html;
        }
        
        async function updateStatus(bookingId, newStatus) {
            if (!supabaseClient) return;
            
            try {
                const { error } = await supabaseClient
                    .from('bookings')
                    .update({ status: newStatus, updated_at: new Date() })
                    .eq('id', bookingId);
                
                if (error) throw error;
                
                alert(`Статус изменён на "${newStatus === 'confirmed' ? 'Подтверждена' : 'Отменена'}"`);
                await loadAllBookings();
                
            } catch (err) {
                alert('Ошибка при обновлении');
            }
        }
        
        function applyFilters() {
            const statusFilter = document.getElementById('statusFilter').value;
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = [...allBookings];
            
            if (statusFilter !== 'all') {
                filtered = filtered.filter(b => b.status === statusFilter);
            }
            
            if (searchText) {
                filtered = filtered.filter(b => {
                    const userName = b.users?.full_name?.toLowerCase() || '';
                    const userPhone = b.users?.phone || '';
                    return userName.includes(searchText) || userPhone.includes(searchText);
                });
            }
            
            renderBookingsTable(filtered);
        }
        
        function resetFilters() {
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('searchInput').value = '';
            renderBookingsTable(allBookings);
        }
        
        function exportToExcel() {
            if (!allBookings || allBookings.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }
            
            let csvContent = "ID,Дата,Время,Экскурсия,Посетитель,Телефон,Email,Количество,Сумма,Статус\n";
            
            allBookings.forEach(booking => {
                const schedule = booking.excursion_schedules;
                const excursion = schedule?.excursions;
                const user = booking.users;
                
                const row = [
                    booking.id,
                    schedule?.excursion_date || '-',
                    schedule?.start_time || '-',
                    `"${(excursion?.name || '-').replace(/"/g, '""')}"`,
                    `"${(user?.full_name || '-').replace(/"/g, '""')}"`,
                    user?.phone || '-',
                    user?.email || '-',
                    booking.persons_count,
                    booking.total_price,
                    booking.status
                ].join(',');
                
                csvContent += row + "\n";
            });
            
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `bookings_${new Date().toISOString().slice(0, 10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
        
        function formatDateDisplay(dateStr) {
            if (!dateStr) return '-';
            const [year, month, day] = dateStr.split('-');
            return `${day}.${month}.${year}`;
        }
        
        initSupabase();
    </script>
</body>
</html>
