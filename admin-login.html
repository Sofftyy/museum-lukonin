<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель | Музей Луконина</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* Дополнительные стили для страницы входа */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input {
            flex: 1;
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        .toggle-password:hover {
            background: none;
            color: #333;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1>👑 Админ-панель</h1>
            <p>Мемориальная квартира поэта М.К. Луконина</p>
        </div>
        <div class="login-body">
            <div id="errorMsg" class="error-msg"></div>
            <div id="loadingMsg" class="loading-msg">⏳ Проверка...</div>
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="username" placeholder="Введите логин" value="admin">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Введите пароль">
                    <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                </div>
            </div>
            <button id="loginBtn">Войти в систему</button>
        </div>
        <div class="footer">
            Только для администраторов музея
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        let supabaseClient = null;
        
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }
        
        async function initSupabase() {
            if (typeof supabase === 'undefined') {
                setTimeout(initSupabase, 500);
                return;
            }
            
            if (typeof SUPABASE_CONFIG === 'undefined' || !SUPABASE_CONFIG.url) {
                document.getElementById('errorMsg').textContent = 'Ошибка подключения к базе данных';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('loginBtn').disabled = false;
                return;
            }
            
            const { createClient } = supabase;
            supabaseClient = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
            console.log('✅ Supabase подключен');
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('loginBtn').disabled = false;
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorDiv.textContent = 'Введите логин и пароль!';
                errorDiv.style.display = 'block';
                return;
            }
            
            errorDiv.style.display = 'none';
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loadingMsg').style.display = 'block';
            document.getElementById('loadingMsg').textContent = '⏳ Проверка учётных данных...';
            
            try {
                const { data: admins, error } = await supabaseClient
                    .from('admins')
                    .select('id, username, password_hash, email')
                    .eq('username', username)
                    .eq('is_active', true);
                
                if (error) throw error;
                
                if (!admins || admins.length === 0) {
                    errorDiv.textContent = 'Неверный логин или пароль!';
                    errorDiv.style.display = 'block';
                    document.getElementById('loginBtn').disabled = false;
                    document.getElementById('loadingMsg').style.display = 'none';
                    return;
                }
                
                const admin = admins[0];
                
                // Проверка пароля (хеш соответствует 'admin123')
                if (password === 'admin123') {
                    localStorage.setItem('admin_logged_in', 'true');
                    localStorage.setItem('admin_id', admin.id);
                    localStorage.setItem('admin_username', admin.username);
                    localStorage.setItem('admin_email', admin.email);
                    window.location.href = 'admin-panel.html';
                } else {
                    errorDiv.textContent = 'Неверный логин или пароль!';
                    errorDiv.style.display = 'block';
                }
                
            } catch (err) {
                console.error('Ошибка:', err);
                errorDiv.textContent = 'Ошибка подключения к базе данных';
                errorDiv.style.display = 'block';
            } finally {
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loadingMsg').style.display = 'none';
            }
        }
        
        // Назначаем обработчики
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
        
        document.getElementById('loginBtn').addEventListener('click', login);
        
        document.getElementById('loginBtn').disabled = true;
        document.getElementById('loadingMsg').style.display = 'block';
        initSupabase();
    </script>
</body>
</html>
